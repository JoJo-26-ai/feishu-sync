name: 小红书笔记爬取

on:
  schedule:
    # 每天北京时间 16:00 自动运行（UTC+8 16:00 = UTC 08:00）
    - cron: '0 8 * * *'
  workflow_dispatch:  # 允许手动点击运行（不受定时约束）

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: pip install requests

      - name: 运行爬虫
        env:
          XHS_COOKIE: ${{ secrets.XHS_COOKIE }}
          XHS_KEYWORD: ${{ secrets.XHS_KEYWORD }}
        run: python xhs_crawler.py

      - name: 上传爬取结果
        uses: actions/upload-artifact@v4
        with:
          name: xhs-notes
          path: xhs_notes.csv
          retention-days: 7  # 结果保留 7 天
