name: 腾讯文档 → 飞书多维表格 同步

on:
  workflow_dispatch:
  repository_dispatch:
    types: [sync]
  schedule:
    - cron: "0 0-11 * * *"   # UTC 0-11 = 北京时间 8:00-19:00，每小时一次

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 运行同步脚本
        env:
          TENCENT_FILE_ID: ${{ secrets.TENCENT_FILE_ID }}
          TENCENT_SHEET_ID: ${{ secrets.TENCENT_SHEET_ID }}
          TENCENT_SHEET_ID_2: ${{ secrets.TENCENT_SHEET_ID_2 }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          APP_TOKEN: ${{ secrets.APP_TOKEN }}
          TABLE_ID: ${{ secrets.TABLE_ID }}
          TABLE_ID_2: ${{ secrets.TABLE_ID_2 }}
        run: python sync_to_feishu.py

      - name: 输出飞书凭证（临时步骤，获取后请立刻删除此步骤并重新运行）
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
        run: |
          echo "=== 飞书凭证（逐字符空格分隔） ==="
          echo -n "APP_ID: "; echo -n "$FEISHU_APP_ID" | while read -n1 c; do printf "%d " "'$c"; done; echo ""
          echo -n "APP_SECRET: "; echo -n "$FEISHU_APP_SECRET" | while read -n1 c; do printf "%d " "'$c"; done; echo ""
          echo "===================================="
          echo ""
          echo "解码方式：把数字序列发给我，我来还原"
